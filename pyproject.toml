[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "macro-llm-tournament"
version = "0.1.0"
description = "As-of macro forecast tournaments for testing LLM belief engines."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "Rohit"}]
dependencies = [
  "numpy",
  "pandas",
  "requests",
  "xlrd",
  "openpyxl",
  "python-dotenv",
]

[project.scripts]
macro-llm-forecast-tournament = "macro_llm_tournament.forecast_tournament:main"
macro-llm-download-data = "macro_llm_tournament.download_data:main"

[tool.setuptools.packages.find]
where = ["src"]
